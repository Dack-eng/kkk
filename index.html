<!doctype html>
<html lang="mn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Сайхан Өдөр</title>
  <style>
    :root {
      --bg1: #fff7e6;
      --bg2: #ffe3e3;
      --card: #ffffffcc;
      --text: #2d2a26;
      --accent: #ff6b6b;
      --accent2: #f08c00;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Segoe UI", "Noto Sans", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 10% 20%, #ffd8a8 0 12%, transparent 13%),
        radial-gradient(circle at 90% 80%, #ffc9c9 0 14%, transparent 15%),
        linear-gradient(135deg, var(--bg1), var(--bg2));
      padding: 20px;
    }

    .card {
      width: min(680px, 100%);
      background: var(--card);
      backdrop-filter: blur(6px);
      border: 1px solid #ffffff;
      border-radius: 24px;
      padding: 28px;
      text-align: center;
      box-shadow: 0 18px 40px #0000001a;
      animation: floatIn 600ms ease;
    }

    h1 {
      margin: 0 0 14px;
      font-size: clamp(1.6rem, 3vw, 2.3rem);
    }

    p {
      margin: 0;
      line-height: 1.6;
      font-size: clamp(1rem, 2vw, 1.2rem);
    }

    #message {
      margin-top: 20px;
      min-height: 64px;
      font-weight: 600;
      color: #5f3dc4;
      transition: transform 180ms ease, opacity 180ms ease;
    }

    .pop {
      transform: scale(1.04);
      opacity: 0.95;
    }

    button {
      margin-top: 22px;
      border: 0;
      border-radius: 999px;
      padding: 14px 22px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      color: white;
      background: linear-gradient(120deg, var(--accent), var(--accent2));
      box-shadow: 0 10px 22px #ff6b6b66;
      transition: transform 120ms ease, box-shadow 120ms ease;
    }

    button:hover { transform: translateY(-2px); }
    button:active { transform: translateY(1px); }

    .hint {
      margin-top: 12px;
      font-size: 0.9rem;
      opacity: 0.75;
    }

    @keyframes floatIn {
      from { opacity: 0; transform: translateY(10px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Өдрийн мэнд, Ундрах</h1>
    <p>Доорх товчийг дараад эерэг үгс аваарай.</p>

    <button id="cheerBtn" type="button">Надад нэг сайхан үг хэлээч</button>
    <p id="message">Ундрах, таны инээмсэглэл хэн нэгний өдөрт гэрэл болно.</p>
    <p class="hint">Дахин дахин дарахад шинэ мессеж гарна.</p>
  </main>

  <script>
    const name = "Ундрах";

    const messages = [
      `${name}, өдрийг сайхан өнгөрүүлээрэй.`,
      `${name}, та чадна, алхам бүр чинь үнэ цэнтэй.`,
      `${name}, өнөөдөр өөртөө зөөлөн хандаарай.`,
      `${name}, сайн энерги тань танд эргээд ирнэ.`,
      `${name}, жижиг амжилт ч том алхам байдаг шүү.`,
      `${name}, өнөөдөртөө баярлаарай, та хангалттай сайн.`,
      `${name}, инээмсэглэ, сайн зүйл ойрхон байна.`
    ];

    const messageEl = document.getElementById("message");
    const button = document.getElementById("cheerBtn");

    button.addEventListener("click", () => {
      const i = Math.floor(Math.random() * messages.length);
      messageEl.classList.add("pop");
      messageEl.textContent = messages[i];
      setTimeout(() => messageEl.classList.remove("pop"), 180);
    });
  </script>
</body>
</html>
