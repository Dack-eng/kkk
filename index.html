<!doctype html>
<html lang="mn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Сайхан Өдөр | Ундрах</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Playfair+Display:wght@600;700&display=swap');

    :root {
      --ink: #1c1a25;
      --muted: #5f5a73;
      --card: rgba(255, 255, 255, 0.68);
      --card-border: rgba(255, 255, 255, 0.55);
      --accent-a: #ff5f6d;
      --accent-b: #ffc371;
      --accent-c: #5b8dff;
      --shadow: 0 24px 70px rgba(49, 34, 90, 0.2);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Plus Jakarta Sans", "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 12% 15%, rgba(255, 177, 115, 0.85) 0 20%, transparent 23%),
        radial-gradient(circle at 86% 83%, rgba(255, 116, 156, 0.55) 0 21%, transparent 24%),
        radial-gradient(circle at 78% 18%, rgba(117, 155, 255, 0.4) 0 16%, transparent 20%),
        linear-gradient(120deg, #fff5e8 0%, #ffe8f0 45%, #e9efff 100%);
      overflow: hidden;
      padding: 24px;
    }

    .ambient {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .ambient::before,
    .ambient::after {
      content: "";
      position: absolute;
      width: 44vmax;
      height: 44vmax;
      border-radius: 50%;
      filter: blur(45px);
      opacity: 0.42;
      animation: drift 18s ease-in-out infinite alternate;
    }

    .ambient::before {
      left: -8vmax;
      top: -12vmax;
      background: #ffd27f;
    }

    .ambient::after {
      right: -10vmax;
      bottom: -14vmax;
      background: #ff8fb1;
      animation-duration: 24s;
    }

    .card {
      position: relative;
      z-index: 1;
      width: min(760px, 100%);
      border-radius: 32px;
      padding: clamp(24px, 5vw, 46px);
      background: var(--card);
      border: 1px solid var(--card-border);
      backdrop-filter: blur(12px);
      box-shadow: var(--shadow);
      animation: cardIn 720ms cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    .eyebrow {
      margin: 0;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.16em;
      color: #7e5a68;
      text-transform: uppercase;
    }

    h1 {
      margin: 12px 0 14px;
      font-family: "Playfair Display", Georgia, serif;
      font-size: clamp(2rem, 5.2vw, 3.5rem);
      line-height: 1.1;
    }

    .sub {
      margin: 0;
      color: var(--muted);
      font-size: clamp(1rem, 2.3vw, 1.18rem);
      line-height: 1.6;
      max-width: 44ch;
    }

    .actions {
      margin-top: 30px;
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 14px 22px;
      font-size: 0.98rem;
      font-weight: 800;
      color: #fff;
      letter-spacing: 0.01em;
      cursor: pointer;
      background: linear-gradient(100deg, var(--accent-a), var(--accent-b));
      box-shadow: 0 14px 24px rgba(252, 118, 107, 0.34);
      transition: transform 140ms ease, box-shadow 140ms ease, filter 140ms ease;
    }

    button:hover {
      transform: translateY(-2px) scale(1.01);
      filter: saturate(1.1);
    }

    button:active {
      transform: translateY(1px);
    }

    .chip {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 9px 14px;
      font-size: 0.84rem;
      font-weight: 700;
      color: #3f3a54;
      background: rgba(255, 255, 255, 0.75);
      border: 1px solid rgba(255, 255, 255, 0.9);
    }

    #message {
      margin-top: 28px;
      padding: 18px 20px;
      border-radius: 18px;
      font-size: clamp(1.05rem, 2.5vw, 1.35rem);
      font-weight: 700;
      line-height: 1.45;
      color: #2f2a46;
      background:
        linear-gradient(110deg, rgba(255, 255, 255, 0.74), rgba(255, 255, 255, 0.48));
      border: 1px solid rgba(255, 255, 255, 0.85);
      min-height: 86px;
      display: grid;
      align-items: center;
      transform-origin: center;
      transition: transform 200ms ease, opacity 200ms ease;
    }

    #message.pop {
      transform: scale(1.02);
      opacity: 0.96;
    }

    .hint {
      margin-top: 14px;
      margin-bottom: 0;
      font-size: 0.9rem;
      color: #6d6783;
    }

    .line {
      display: inline-block;
      background: linear-gradient(90deg, #ff6b6b, #4d82ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    @keyframes cardIn {
      from {
        opacity: 0;
        transform: translateY(16px) scale(0.98);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes drift {
      from { transform: translateY(0) translateX(0) scale(1); }
      to { transform: translateY(2vmax) translateX(1.5vmax) scale(1.08); }
    }

    @media (max-width: 640px) {
      body {
        padding: 14px;
      }

      .card {
        border-radius: 24px;
      }

      .actions {
        margin-top: 22px;
      }

      button {
        width: 100%;
        text-align: center;
      }

      .chip {
        width: 100%;
        justify-content: center;
      }
    }
  </style>
</head>
<body>
  <div class="ambient" aria-hidden="true"></div>

  <main class="card">
    <p class="eyebrow">Positive Space</p>
    <h1>
      Өдрийн мэнд, <span class="line">Ундрах</span>
    </h1>
    <p class="sub">Өнөөдрийнхөө хэмнэлийг зөөлөн, эерэг эхлүүлцгээе. Нэг даралт, нэг сайхан энерги.</p>

    <div class="actions">
      <button id="cheerBtn" type="button">Сайхан үг авах</button>
      <span class="chip">Daily boost mode</span>
    </div>

    <p id="message">Ундрах, өнөөдөр таны тайван байдал хамгийн том хүч чинь шүү.</p>
    <p class="hint">Товчоо дахин дарахад шинэ мессеж гарна.</p>
  </main>

  <script>
    const name = "Ундрах";

    const messages = [
      `${name}, өдрийг өөрийн хэмнэлээрээ гоё өнгөрүүлээрэй.`,
      `${name}, таны жижиг алхам бүр амжилтын үндэс.`,
      `${name}, өнөөдөр өөртөө итгэх итгэлээ улам тодруул.`,
      `${name}, таны энерги энэ өрөөг гэрэлтүүлж байна.`,
      `${name}, амрах хэрэгтэй үедээ тайван амраарай.`,
      `${name}, чи яг одоо байгаа чигээрээ хангалттай гайхалтай.`,
      `${name}, сайн зүйлс чамайг чиглээд ирж байна.`
    ];

    const messageEl = document.getElementById("message");
    const button = document.getElementById("cheerBtn");

    button.addEventListener("click", () => {
      const i = Math.floor(Math.random() * messages.length);
      messageEl.classList.add("pop");
      messageEl.textContent = messages[i];
      setTimeout(() => messageEl.classList.remove("pop"), 210);
    });
  </script>
</body>
</html>
